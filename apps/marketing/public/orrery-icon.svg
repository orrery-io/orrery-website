<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="60%" stop-color="#F4A623"/>
      <stop offset="100%" stop-color="#E07A1A"/>
    </radialGradient>
    <radialGradient id="p1" cx="40%" cy="35%"><stop offset="0%" stop-color="#A8D8EA"/><stop offset="100%" stop-color="#5B9BD5"/></radialGradient>
    <radialGradient id="p2" cx="40%" cy="35%"><stop offset="0%" stop-color="#C4B5E0"/><stop offset="100%" stop-color="#7B6BA1"/></radialGradient>
    <radialGradient id="p3" cx="40%" cy="35%"><stop offset="0%" stop-color="#F7C59F"/><stop offset="100%" stop-color="#D4845A"/></radialGradient>
  </defs>

  <!-- Orbits — bold -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="#3A3A4A" stroke-width="4" stroke-opacity="0.6" transform="rotate(-20,256,256)"/>
  <ellipse cx="256" cy="256" rx="145" ry="58" fill="none" stroke="#3A3A4A" stroke-width="3.5" stroke-opacity="0.6" transform="rotate(25,256,256)"/>
  <ellipse cx="256" cy="256" rx="90" ry="36" fill="none" stroke="#3A3A4A" stroke-width="3" stroke-opacity="0.6" transform="rotate(-50,256,256)"/>

  <!-- Armature — visible -->
  <line x1="256" y1="256" x2="308.8" y2="241.6" stroke="#5A5A6A" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="140.9" y2="180.4" stroke="#5A5A6A" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="355.9" y2="154.5" stroke="#5A5A6A" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Sun -->
  <circle cx="256" cy="256" r="24" fill="url(#sun)"/>
  <circle cx="256" cy="256" r="31" fill="none" stroke="#F4A623" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="5" fill="#3A3A4A"/>

  <!-- Planets — bumped up -->
  <circle cx="308.8" cy="241.6" r="10" fill="url(#p1)"/>
  <circle cx="140.9" cy="180.4" r="13" fill="url(#p2)"/>
  <circle cx="355.9" cy="154.5" r="15" fill="url(#p3)"/>
</svg>
